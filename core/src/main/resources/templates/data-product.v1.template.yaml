schemaVersion: data-product/v1
metadata:
  name: ${NAME}
  displayName: ${DISPLAY_NAME}
  domain: ${DOMAIN}
  description: ${DESCRIPTION}
spec:
  kind: ${KIND} # source-aligned/aggregate/consumer-aligned
  resources:
    -
      name: ${COMPONENT_NAME}
      displayName: ${COMPONENT_DISPLAY_NAME}
      kind: ${COMPONENT_KIND} # bucket
      definition:
        schemaVersion: ${COMPONENT_SCHEMA} # bucket/v1
        version: ${COMPONENT_VERSION} #  0.0.1
        config:
          lifecycleDays: ${COMPONENT_LIFECYCLE_DAYS} # bucket=30