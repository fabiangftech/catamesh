schemaVersion: data-product/v1
metadata:
  name: ${NAME}
  displayName: ${DISPLAY_NAME}
  domain: ${DOMAIN}
  description: this is a data product!
spec:
  kind: source-aligned
  resources:
    -
      name: ${COMPONENT_NAME}
      displayName: ${COMPONENT_DISPLAY_NAME}
      kind: bucket
      definition:
        schemaVersion: bucket/v1
        version: 0.0.1
        config:
          lifecycleDays: 30